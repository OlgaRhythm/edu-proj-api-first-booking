services:
  loki:
    image: grafana/loki:2.9.10
    container_name: booking-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    networks:
      - observability

  promtail:
    image: grafana/promtail:2.9.10
    container_name: booking-promtail
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yml
      - ./logs:/var/log/booking
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - observability

  victorialogs:
    image: victoriametrics/victoria-logs:v1.0.0-victorialogs
    container_name: booking-victorialogs
    ports:
      - "9428:9428"
    volumes:
      - victorialogs-data:/vlogs
    command:
      - "--storageDataPath=/vlogs"
      - "--httpListenAddr=:9428"
      - "--loggerLevel=INFO"
      - "--retentionPeriod=30d"
    networks:
      - observability

  tempo:
    image: grafana/tempo:2.7.1
    container_name: booking-tempo
    user: "0:0"
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
      - "3200:3200"  # Tempo Query API
    command: [ "-config.file=/etc/tempo-config.yaml" ]
    volumes:
      - ./tempo-config.yaml:/etc/tempo-config.yaml
      - tempo-data:/tmp/tempo
    networks:
      - observability

  grafana:
    image: grafana/grafana:11.1.0
    container_name: booking-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    depends_on:
      - tempo
      - loki
      - victorialogs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - observability

networks:
  observability:
    driver: bridge

volumes:
  loki-data:
  victorialogs-data:
  tempo-data: