services:
  loki:
    image: grafana/loki:2.9.10
    container_name: booking-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    networks:
      - observability

  promtail:
    image: grafana/promtail:2.9.10
    container_name: booking-promtail
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yml
      - ./logs:/var/log/booking
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - observability

  victorialogs:
    image: victoriametrics/victoria-logs:v1.0.0-victorialogs
    container_name: booking-victorialogs
    ports:
      - "9428:9428"
    volumes:
      - victorialogs-data:/vlogs
    command:
      - "--storageDataPath=/vlogs"
      - "--httpListenAddr=:9428"
      - "--loggerLevel=INFO"
      - "--retentionPeriod=30d"
    networks:
      - observability

networks:
  observability:
    driver: bridge

volumes:
  loki-data:
  victorialogs-data: