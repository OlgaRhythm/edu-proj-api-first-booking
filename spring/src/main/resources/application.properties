server.port=8080

management.endpoints.web.exposure.include=health,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=meeting-rooms

management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces

logging.file.name=logs/booking-service.log
logging.level.root=INFO
logging.level.org.openapitools=INFO
logging.level.org.springframework=INFO
logging.pattern.file={"timestamp":"%d{yyyy-MM-dd HH:mm:ss}","level":"%level","traceId":"%X{traceId:-}","spanId":"%X{spanId:-}","logger":"%logger{36}","message":"%msg"}%n
logging.pattern.console={"timestamp":"%d{yyyy-MM-dd HH:mm:ss}","level":"%level","traceId":"%X{traceId:-}","spanId":"%X{spanId:-}","logger":"%logger{36}","message":"%msg"}%n

springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/api-docs